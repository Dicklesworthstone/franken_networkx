name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify-version:
    name: Verify tag and version consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify release tag matches Cargo versions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          root = Path(".")
          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag.removeprefix("v")
          workspace = tomllib.loads((root / "Cargo.toml").read_text(encoding="utf-8"))
          fnx_python = tomllib.loads((root / "crates/fnx-python/Cargo.toml").read_text(encoding="utf-8"))
          workspace_version = workspace["workspace"]["package"]["version"]
          crate_version = fnx_python["package"]["version"]
          if expected != workspace_version or expected != crate_version:
              raise SystemExit(
                  f"tag version mismatch: tag={expected} workspace={workspace_version} fnx-python={crate_version}"
              )
          print(f"release_version_ok {expected}")
          PY

  linux:
    name: Linux ${{ matrix.target }}
    needs: verify-version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          rust-toolchain: nightly
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  musllinux:
    name: musllinux x86_64
    needs: verify-version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          args: --release --out dist
          manylinux: musllinux_1_2
          rust-toolchain: nightly
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-x86_64
          path: dist

  macos:
    name: macOS ${{ matrix.target }}
    needs: verify-version
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          rust-toolchain: nightly
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: Windows x86_64
    needs: verify-version
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          rust-toolchain: nightly
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  sdist:
    name: Source distribution
    needs: verify-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          rust-toolchain: nightly
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  pytest:
    name: Test wheel (${{ matrix.os }})
    needs: [linux, macos, windows]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wheels-linux-x86_64
          - os: macos-14
            artifact: wheels-macos-aarch64-apple-darwin
          - os: windows-latest
            artifact: wheels-windows-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - name: Install wheel and test deps
        run: pip install --find-links dist franken-networkx[test]
      - name: Smoke installed wheel in clean venv
        shell: bash
        run: DIST_DIR=dist PACKAGE_NAME=franken-networkx ./scripts/test_pypi_install.sh
      - name: Run tests
        run: pytest tests/python/ -v --tb=long -m "not slow"

  publish:
    name: Publish to PyPI
    needs: [linux, musllinux, macos, windows, sdist, pytest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/franken-networkx
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
